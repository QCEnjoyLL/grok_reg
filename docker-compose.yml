services:
  grok-reg:
    image: ${GROK_REG_IMAGE:-grok-reg:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: grok-reg
    restart: unless-stopped
    environment:
      DISPLAY: ":99"
      DATA_DIR: /data
      APP_HOME: /app
      WEB_PORT: "8080"
      VNC_PORT: "5900"
      NOVNC_PORT: "6080"
      RESOLUTION: ${RESOLUTION:-1920x1080x24}
      VNC_PASSWORD: ${VNC_PASSWORD:-grokreg}
      WEB_TOKEN: ${WEB_TOKEN:-}
      DASHBOARD_TITLE: ${DASHBOARD_TITLE:-Grok Register}
      http_proxy: ${http_proxy:-}
      https_proxy: ${https_proxy:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    ports:
      - "${WEB_HOST_PORT:-8080}:8080"
      - "${NOVNC_HOST_PORT:-6080}:6080"
      - "${VNC_HOST_PORT:-5900}:5900"
    volumes:
      - ./data:/data
    shm_size: "1gb"
    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    command: ["web"]
