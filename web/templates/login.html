<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} - 登录</title>
  <link rel="icon" href="/static/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/static/style.css" />
  <script id="theme-boot">
  (function () {
    try {
      var k = "grok_reg_theme";
      var pref = localStorage.getItem(k) || "system";
      var dark = pref === "dark" || (pref === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.classList.toggle("dark", !!dark);
      document.documentElement.dataset.theme = pref;
    } catch (e) {}
  })();
  </script>
</head>
<body class="login-body">
  <div id="toast-host" aria-live="polite"></div>
  <div class="login-card">
    <div class="brand login-brand">
      <img class="logo-img" src="/static/logo.svg" width="44" height="44" alt="Grok Register" />
      <div>
        <h1>{{ title }}</h1>
        <p class="sub">请输入访问 Token（相当于登录密码）</p>
      </div>
    </div>
    <form id="login-form" class="form">
      <label>Token
        <input type="password" id="login-token" name="token" autocomplete="current-password"
               placeholder="默认 change-me，可在后台修改" required />
      </label>
      <button type="submit" class="btn primary">进入后台</button>
      <p id="login-error" class="error" hidden></p>
      <p class="hint login-repo"><a class="repo-link" href="https://github.com/QCEnjoyLL/grok_reg" target="_blank" rel="noopener noreferrer">项目地址 · GitHub</a></p>
      <p class="hint">Token 来自启动参数 <code>-e WEB_TOKEN=...</code>，或后台「系统设置」修改后写入 <code>/data/ui_settings.json</code>。</p>
    </form>
  </div>
  <script>
    const form = document.getElementById("login-form");
    const err = document.getElementById("login-error");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.hidden = true;
      const token = document.getElementById("login-token").value.trim();
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "登录失败");
        localStorage.setItem("web_token", token);
        location.href = "/";
      } catch (ex) {
        err.textContent = String(ex.message || ex);
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
