<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }} ? ??</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="brand login-brand">
      <span class="logo">G</span>
      <div>
        <h1>{{ title }}</h1>
        <p class="sub">????? Token?????????</p>
      </div>
    </div>
    <form id="login-form" class="form">
      <label>Token
        <input type="password" id="login-token" name="token" autocomplete="current-password" placeholder="?? change-me???????" required />
      </label>
      <button type="submit" class="btn primary" style="width:100%">????</button>
      <p id="login-error" class="error" hidden></p>
      <p class="hint">Token ?????? <code>-e WEB_TOKEN=...</code>???????????????? <code>/data/ui_settings.json</code>?</p>
    </form>
  </div>
  <script>
    const form = document.getElementById("login-form");
    const err = document.getElementById("login-error");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      err.hidden = true;
      const token = document.getElementById("login-token").value.trim();
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || "????");
        localStorage.setItem("web_token", token);
        location.href = "/";
      } catch (ex) {
        err.textContent = String(ex.message || ex);
        err.hidden = false;
      }
    });
  </script>
</body>
</html>
